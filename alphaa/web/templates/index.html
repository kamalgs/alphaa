{% extends "base.html" %}
{% block title %}New Backtest — AlphaA{% endblock %}

{% block content %}
<h1>Run a Backtest</h1>

{% if error %}
<article aria-label="Error" style="border-left: 4px solid red; padding-left: 1rem;">
    <p><strong>Error:</strong> {{ error }}</p>
</article>
{% endif %}

<form method="post" action="/run">
    <div class="grid">
        <label>
            Symbol
            <input type="text" name="symbol" value="{{ symbol or 'RELIANCE.NS' }}" required>
        </label>
        <label>
            Start Date
            <input type="date" name="start" value="{{ start or '2019-01-01' }}" required>
        </label>
        <label>
            End Date
            <input type="date" name="end" value="{{ end or '2024-01-01' }}" required>
        </label>
    </div>

    <div class="grid">
        <label>
            Starting Capital
            <input type="number" name="capital" value="{{ capital or '100000' }}" step="1000" min="1000" required>
        </label>
        <label>
            Strategy
            <select name="strategy_id">
                <option value="builtin" {% if not strategy_id or strategy_id == 'builtin' %}selected{% endif %}>Built-in (Buy Low, Sell High)</option>
                {% for s in strategies %}
                <option value="{{ s.id }}" {% if strategy_id == s.id|string %}selected{% endif %}>{{ s.name }}</option>
                {% endfor %}
            </select>
        </label>
    </div>

    <label>
        Strategy Parameters (JSON)
        <textarea name="strategy_params" rows="3" placeholder='{"entry_pct": 5, "exit_pct": 5, "stop_loss_pct": 10}'>{{ strategy_params or '{}' }}</textarea>
    </label>

    <button type="submit">Run Backtest</button>
</form>
{% endblock %}
