{% extends "base.html" %}
{% block title %}New Backtest — AlphaA{% endblock %}

{% block content %}
<h1>Run a Backtest</h1>

{% if error %}
<article aria-label="Error" style="border-left: 4px solid red; padding-left: 1rem;">
    <p><strong>Error:</strong> {{ error }}</p>
</article>
{% endif %}

<form method="post" action="/run">
    <div class="grid">
        <label>
            Symbol
            <input type="text" name="symbol" value="{{ symbol or 'RELIANCE.NS' }}" required>
        </label>
        <label>
            Start Date
            <input type="date" name="start" value="{{ start or '2019-01-01' }}" required>
        </label>
        <label>
            End Date
            <input type="date" name="end" value="{{ end or '2024-01-01' }}" required>
        </label>
    </div>

    <div class="grid">
        <label>
            Starting Capital
            <input type="number" name="capital" value="{{ capital or '100000' }}" step="1000" min="1000" required>
        </label>
        <label>
            Entry % (near 52w low)
            <input type="number" name="entry_pct" value="{{ entry_pct or '5' }}" step="0.5" min="0.5" max="50" required>
        </label>
        <label>
            Exit % (near 52w high)
            <input type="number" name="exit_pct" value="{{ exit_pct or '5' }}" step="0.5" min="0.5" max="50" required>
        </label>
        <label>
            Stop Loss %
            <input type="number" name="stop_loss" value="{{ stop_loss or '10' }}" step="0.5" min="1" max="50" required>
        </label>
    </div>

    <button type="submit">Run Backtest</button>
</form>
{% endblock %}
